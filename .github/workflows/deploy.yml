name: CI/CD Pipeline

# Trigger: push to main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # run tests on PRs too, but don't deploy

# Environment variables shared across all jobs
env:
  ECR_REPOSITORY: samle-test         # your ECR repo name
  AWS_REGION: ${{ secrets.AWS_REGION }}   # e.g. ap-south-1

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Run tests
  # ────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

  # ────────────────────────────────────────────
  # JOB 2: Build Docker image & push to ECR
  # Only runs on push to main (not on PRs)
  # ────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test                          # must pass tests first
    if: github.event_name == 'push'     # skip on PRs

    outputs:
      image: ${{ steps.build.outputs.image }}   # pass image URI to deploy job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push Docker image
        id: build
        working-directory: app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build the image
          docker build \
            --build-arg APP_VERSION=$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Output full image URI for the deploy job
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Print image URI
        run: echo "Pushed image → ${{ steps.build.outputs.image }}"

  # ────────────────────────────────────────────
  # JOB 3: Deploy to server via SSH
  # ────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: SSH into server & deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ECR_REPOSITORY,AWS_REGION
          script: |
            # ── 1. Authenticate Docker to ECR ──
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ secrets.ECR_REGISTRY }}

            # ── 2. Pull the new image ──
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            # ── 3. Stop & remove old container (ignore errors if not running) ──
            docker stop cicd-sample-app || true
            docker rm   cicd-sample-app || true

            # ── 4. Start new container ──
            docker run -d \
              --name cicd-sample-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              -e APP_VERSION=${{ github.sha }} \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            # ── 5. Verify it started ──
            sleep 5
            docker ps | grep cicd-sample-app
            echo "✅ Deploy successful — commit ${{ github.sha }}"

            # ── 6. Clean up old local images (keep last 3) ──
            docker images ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }} \
              --format "{{.ID}}" | tail -n +4 | xargs -r docker rmi || true
